name: Build and push server image to GHCR

on:
    push:
        branches: ["main"]
        paths: ["server/**"]
    workflow_dispatch:

jobs:
    build:
        runs-on: ubuntu-latest

        permissions:
            contents: read
            packages: write

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set outputs
              id: vars
              run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Log in to GHCR
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Build and push
              uses: docker/build-push-action@v5
              with:
                  context: ./server
                  push: true
                  cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/clearhear-server:cache
                  cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/clearhear-server:cache,mode=max
                  tags: |
                      ghcr.io/${{ github.repository_owner }}/clearhear-server:latest
                      ghcr.io/${{ github.repository_owner }}/clearhear-server:${{ steps.vars.outputs.sha_short }}
